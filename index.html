<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Our Premium Collection</h1>
    </header>

    <div id="status" style="text-align: center; color: #666; margin-bottom: 20px;">Loading catalog...</div>
    <div id="product-grid" class="container"></div>

    <script>
        async function loadSite() {
            const grid = document.getElementById('product-grid');
            const status = document.getElementById('status');
            
            try {
                const manifestRes = await fetch('manifest.json');
                const { products } = await manifestRes.json();
                status.style.display = 'none';

                for (const folder of products) {
                    try {
                        const [dataRes, imgRes] = await Promise.all([
                            fetch(`products/${folder}/data.json`),
                            fetch(`products/${folder}/Img.json`)
                        ]);
                        
                        const data = await dataRes.json();
                        const imgData = await imgRes.json();
                        
                        const imageUrl = (imgData.images && imgData.images.length > 0) ? imgData.images[0] : '';

                        grid.innerHTML += `
                            <div class="card">
                                ${imageUrl ? `<img src="${imageUrl}" alt="${data.name}">` : '<div class="no-img">No Image</div>'}
                                <h3>${data.name}</h3>
                                <p class="desc">${data.description}</p>
                                <p class="price">${data.price}</p>
                                <a href="payments.html" class="btn">Buy Now</a>
                            </div>
                        `;
                    } catch (e) {
                        console.error("Error loading " + folder, e);
                    }
                }
            } catch (e) {
                status.innerText = "Error loading store: " + e.message;
            }
        }
        loadSite();
    </script>
</body>
</html>
