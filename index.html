<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Marketplace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        body { background: #f0f4f8; color: #1e293b; font-family: 'Fredoka', sans-serif; margin: 0; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3rem; color: #3b82f6; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: #fff; padding: 25px; border-radius: 30px; border: 4px solid #e2e8f0; text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-15px) scale(1.03); border-color: #3b82f6; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; background-color: #f8fafc; }
        .price { font-size: 1.5rem; color: #10b981; font-weight: 700; margin: 15px 0; }
        .btn { display: block; background: #3b82f6; color: #fff; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 0 #1d4ed8; }
    </style>
</head>
<body>
    <header><h1>✨ Aurora Marketplace ✨</h1></header>
    <div id="product-grid" class="container"></div>
    <script>
        async function loadStore() {
            const grid = document.getElementById('product-grid');
            try {
                const res = await fetch('catalog.json');
                const data = await res.json();
                
                for (const file of data.files) {
                    const pRes = await fetch('products/' + file);
                    if (!pRes.ok) continue;
                    const p = await pRes.json();
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200'">
                        <h3>${p.name}</h3>
                        <p style="color:#64748b; margin:10px 0;">${p.description}</p>
                        <div class="price">${p.price}</div>
                        <a href="payments.html" class="btn">BUY NOW</a>
                    `;
                    grid.appendChild(card);
                }
            } catch (e) { console.error("Error loading store:", e); }
        }
        window.addEventListener('DOMContentLoaded', loadStore);
    </script>
</body>
</html>
