<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="debug" style="padding: 20px; color: red; font-family: sans-serif;">Loading...</div>
    <div id="product-grid" class="container"></div>

    <script>
        async function loadSite() {
            const debug = document.getElementById('debug');
            try {
                const response = await fetch('manifest.json');
                if (!response.ok) throw new Error("Could not find manifest.json at root");
                
                const manifest = await response.json();
                debug.innerText = "Manifest loaded! Products found: " + manifest.products.length;
                
                // If we get here, the manifest works!
            } catch (err) {
                debug.innerText = "CRITICAL ERROR: " + err.message;
            }
        }
        loadSite();
    </script>
</body>
</html>
